<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HackMySenpai — Anime AI Chat</title>
    <meta name="description" content="Chat with HackMcy, an  AI powered by Gemini Pro. Multi-thread history, saved locally." />
    <meta property="og:title" content="HackMcy —  AI Chat" />
    <meta property="og:description" content=" AI Multi-thread history. Powered by Gemini." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
:root {
  --bg: #08050a;
  --bg-2: #0f0a12;
  --panel: rgba(20, 10, 18, 0.7);
  --border: rgba(255, 40, 70, 0.18);
  --border-strong: rgba(255, 60, 90, 0.45);
  --red: #ff2d55;
  --red-2: #ff5577;
  --red-glow: 0 0 24px rgba(255, 45, 85, 0.55);
  --text: #f5e9ec;
  --text-dim: #a89aa0;
  --user-bg: linear-gradient(135deg, rgba(255, 45, 85, 0.22), rgba(255, 45, 85, 0.08));
  --assistant-bg: rgba(255, 255, 255, 0.03);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--text);
  background: var(--bg);
  overflow: hidden;
  display: grid;
  grid-template-columns: 280px 1fr;
}

/* Backgrounds */
.grid-bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse at top left, rgba(255, 45, 85, 0.15), transparent 50%),
    radial-gradient(ellipse at bottom right, rgba(120, 20, 60, 0.18), transparent 60%),
    linear-gradient(180deg, #06030a, #0a050c);
}
.grid-bg::after {
  content: "";
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255, 45, 85, 0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 45, 85, 0.06) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  animation: gridPulse 8s ease-in-out infinite;
}
@keyframes gridPulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }

.scanlines {
  position: fixed; inset: 0; pointer-events: none; z-index: 1;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0,
    transparent 3px,
    rgba(255, 255, 255, 0.015) 3px,
    rgba(255, 255, 255, 0.015) 4px
  );
  mix-blend-mode: overlay;
}

/* Sidebar */
.sidebar {
  position: relative; z-index: 2;
  border-right: 1px solid var(--border);
  background: var(--panel);
  backdrop-filter: blur(14px);
  padding: 20px 16px;
  display: flex; flex-direction: column; gap: 16px;
  overflow: hidden;
}
.brand { display: flex; align-items: center; gap: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.brand-glyph {
  width: 42px; height: 42px; border-radius: 10px;
  background: linear-gradient(135deg, var(--red), #8b0028);
  display: grid; place-items: center;
  font-family: 'Zen Dots', sans-serif; font-size: 22px; color: #fff;
  box-shadow: var(--red-glow);
  animation: pulseGlow 2.4s ease-in-out infinite;
}
@keyframes pulseGlow {
  0%,100% { box-shadow: 0 0 18px rgba(255,45,85,0.45); }
  50% { box-shadow: 0 0 34px rgba(255,45,85,0.85); }
}
.brand-title { font-family: 'Zen Dots', sans-serif; font-size: 14px; letter-spacing: 0.5px; }
.brand-sub { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; }

.threads-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); padding: 0 4px; }
.threads { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; padding-right: 4px; }
.threads::-webkit-scrollbar { width: 6px; }
.threads::-webkit-scrollbar-thumb { background: rgba(255,45,85,0.25); border-radius: 4px; }
.thread-item {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  padding: 10px 12px; border-radius: 10px; cursor: pointer;
  color: var(--text-dim); font-size: 13px;
  border: 1px solid transparent;
  transition: all 0.2s ease;
  animation: slideIn 0.35s ease both;
}
.thread-item:hover { background: rgba(255,45,85,0.06); color: var(--text); }
.thread-item.active { background: rgba(255,45,85,0.12); color: var(--text); border-color: var(--border-strong); box-shadow: inset 0 0 12px rgba(255,45,85,0.1); }
.thread-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.thread-del { opacity: 0; background: none; border: none; color: var(--red-2); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; }
.thread-item:hover .thread-del { opacity: 1; }
.thread-del:hover { background: rgba(255,45,85,0.18); }

.attribution { font-size: 11px; color: var(--text-dim); text-align: center; padding-top: 12px; border-top: 1px solid var(--border); }
.accent { color: var(--red-2); font-weight: 600; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  border: 1px solid var(--border-strong); border-radius: 10px;
  padding: 10px 14px; font-family: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.2s ease; color: var(--text); background: transparent;
}
.btn-primary {
  background: linear-gradient(135deg, var(--red), #b81848);
  border-color: transparent; color: #fff; font-weight: 600;
  box-shadow: 0 4px 20px rgba(255,45,85,0.35);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(255,45,85,0.55); }
.btn-primary:active { transform: translateY(0); }
.icon-btn { background: transparent; border: 1px solid var(--border); color: var(--text); width: 36px; height: 36px; border-radius: 8px; cursor: pointer; display: none; }

/* Main */
.main { position: relative; z-index: 2; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 24px; border-bottom: 1px solid var(--border);
  background: rgba(8, 5, 10, 0.5); backdrop-filter: blur(10px);
}
.model-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px; border: 1px solid var(--border-strong); border-radius: 999px;
  font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-dim);
}
.model-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); box-shadow: 0 0 10px var(--red); animation: pulseGlow 1.6s ease-in-out infinite; }

/* Messages */
.messages { flex: 1; overflow-y: auto; padding: 32px 24px; scroll-behavior: smooth; }
.messages::-webkit-scrollbar { width: 8px; }
.messages::-webkit-scrollbar-thumb { background: rgba(255,45,85,0.25); border-radius: 4px; }

.msg { max-width: 800px; margin: 0 auto 20px; display: flex; gap: 12px; animation: slideUpFade 0.4s ease both; }
.msg.user { flex-direction: row-reverse; }
.msg .avatar {
  width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0;
  display: grid; place-items: center; font-family: 'Zen Dots', sans-serif; font-size: 13px;
  background: linear-gradient(135deg, var(--red), #8b0028); color: #fff;
  box-shadow: 0 0 14px rgba(255,45,85,0.4);
}
.msg.user .avatar { background: linear-gradient(135deg, #2a1520, #1a0a12); border: 1px solid var(--border-strong); }
.msg .bubble {
  padding: 14px 18px; border-radius: 14px; line-height: 1.6; font-size: 14.5px;
  border: 1px solid var(--border);
  max-width: calc(100% - 60px);
  word-wrap: break-word; overflow-wrap: break-word;
}
.msg.user .bubble { background: var(--user-bg); border-color: var(--border-strong); }
.msg.assistant .bubble { background: var(--assistant-bg); }
.bubble pre {
  background: #05030a; border: 1px solid var(--border);
  padding: 12px; border-radius: 8px; overflow-x: auto;
  font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
  margin: 8px 0;
}
.bubble code { font-family: 'JetBrains Mono', monospace; font-size: 0.9em; background: rgba(255,45,85,0.1); padding: 1px 5px; border-radius: 4px; }
.bubble pre code { background: none; padding: 0; }
.bubble a { color: var(--red-2); }
.bubble p + p, .bubble ul, .bubble ol { margin-top: 8px; }
.bubble ul, .bubble ol { padding-left: 20px; }
.bubble h1, .bubble h2, .bubble h3 { margin: 12px 0 6px; font-family: 'Zen Dots', sans-serif; font-size: 15px; }

.typing { display: inline-flex; gap: 4px; align-items: center; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--red-2); animation: bounce 1.2s ease-in-out infinite; }
.typing span:nth-child(2) { animation-delay: 0.15s; }
.typing span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-6px); opacity: 1; } }

/* Empty state */
.empty-state { max-width: 640px; margin: 60px auto; text-align: center; animation: slideUpFade 0.6s ease both; }
.hero-glyph {
  width: 92px; height: 92px; margin: 0 auto 20px; border-radius: 22px;
  background: linear-gradient(135deg, var(--red), #6b0020);
  display: grid; place-items: center; font-family: 'Zen Dots', sans-serif; font-size: 48px; color: #fff;
  box-shadow: 0 0 60px rgba(255,45,85,0.5);
  animation: floatSlow 4s ease-in-out infinite, pulseGlow 3s ease-in-out infinite;
}
@keyframes floatSlow { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
.hero-title { font-family: 'Zen Dots', sans-serif; font-size: 34px; margin-bottom: 8px; background: linear-gradient(135deg, #fff, var(--red-2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.hero-sub { color: var(--text-dim); margin-bottom: 28px; }
.chips { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
.chip {
  border: 1px solid var(--border-strong); background: rgba(255,45,85,0.05);
  color: var(--text); padding: 10px 16px; border-radius: 999px; cursor: pointer;
  font-size: 13px; font-family: inherit; transition: all 0.2s ease;
}
.chip:hover { background: rgba(255,45,85,0.18); transform: translateY(-2px); box-shadow: 0 4px 18px rgba(255,45,85,0.3); }

/* Composer */
.composer {
  display: flex; gap: 10px; align-items: flex-end;
  padding: 16px 24px 20px; border-top: 1px solid var(--border);
  background: rgba(8, 5, 10, 0.6); backdrop-filter: blur(10px);
}
.composer textarea {
  flex: 1; resize: none; max-height: 200px;
  padding: 14px 16px; border-radius: 14px;
  background: var(--panel); border: 1px solid var(--border-strong); color: var(--text);
  font-family: inherit; font-size: 14.5px; line-height: 1.5;
  outline: none; transition: all 0.2s ease;
}
.composer textarea:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(255,45,85,0.15); }
.composer textarea::placeholder { color: var(--text-dim); }
.send { padding: 12px 16px; min-width: 52px; }
.send-arrow { font-size: 16px; }
.send:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

/* Animations */
@keyframes slideUpFade { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }

/* Mobile */
@media (max-width: 800px) {
  body { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed; inset: 0 auto 0 0; width: 280px; z-index: 10;
    transform: translateX(-100%); transition: transform 0.3s ease;
  }
  .sidebar.open { transform: translateX(0); box-shadow: 0 0 40px rgba(0,0,0,0.6); }
  .icon-btn { display: inline-grid; place-items: center; }
  .hero-title { font-size: 26px; }
  .messages, .composer { padding-left: 14px; padding-right: 14px; }
}
    </style>
  </head>
  <body>
    <div class="grid-bg"></div>
    <div class="scanlines"></div>

    <aside id="sidebar" class="sidebar">
      <div class="brand">
        <div class="brand-glyph">咲</div>
        <div>
          <div class="brand-title">HackMySenpai</div>
          <div class="brand-sub">handle with precautions</div>
        </div>
      </div>

      <button id="newThreadBtn" class="btn btn-primary">
        <span>+</span> New Chat
      </button>

      <div class="threads-label">Threads</div>
      <div id="threadsList" class="threads"></div>

      <div class="attribution">
        Made by <span class="accent">Lovable</span> × <span class="accent">mcysync</span>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button id="menuBtn" class="icon-btn" aria-label="Menu">☰</button>
        <div class="model-pill">
          <span class="dot"></span> Gemini 3.1 Pro 
        </div>
      </header>

      <section id="messages" class="messages">
        <div class="empty-state" id="emptyState">
          <div class="hero-glyph">咲</div>
          <h1 class="hero-title">Yo Nga</h1>
          <p class="hero-sub">Ask me anything</p>
          <div class="chips">
            <button class="chip">What is gemini</button>
            <button class="chip">Debug my Python code</button>
            <button class="chip">Explain quantum entanglement</button>
            <button class="chip">Roast my startup idea</button>
          </div>
        </div>
      </section>

      <form id="composer" class="composer">
        <textarea
          id="input"
          placeholder="Message senpai…  (Enter to send, Shift+Enter for newline)"
          rows="1"
          autocomplete="off"
        ></textarea>
        <button id="sendBtn" class="btn btn-primary send" type="submit">
          <span class="send-arrow">➤</span>
        </button>
      </form>
    </main>

    <script>
// HackMySenpai — standalone chat app (vanilla JS)
// Calls the Lovable-hosted /api/public/senpai-chat endpoint so the Gemini key stays server-side.

const API_URL = (() => {
  const override = window.HACKMYSENPAI_API_URL;
  return override || "https://hack-your-senpai.lovable.app/api/public/senpai-chat";
})();

const STORAGE_KEY = "hackmysenpai.threads.v1";
const ACTIVE_KEY = "hackmysenpai.active.v1";

// ---------- storage ----------
function loadThreads() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
  catch { return []; }
}
function saveThreads(threads) { localStorage.setItem(STORAGE_KEY, JSON.stringify(threads)); }
function loadActive() { return localStorage.getItem(ACTIVE_KEY); }
function saveActive(id) { if (id) localStorage.setItem(ACTIVE_KEY, id); else localStorage.removeItem(ACTIVE_KEY); }

// ---------- state ----------
let threads = loadThreads();
let activeId = loadActive();
if (activeId && !threads.find(t => t.id === activeId)) activeId = null;

function currentThread() { return threads.find(t => t.id === activeId) || null; }

function newThread() {
  const t = { id: "t_" + Math.random().toString(36).slice(2, 10), title: "New chat", createdAt: Date.now(), messages: [] };
  threads.unshift(t);
  activeId = t.id;
  saveThreads(threads); saveActive(activeId);
  renderThreads(); renderMessages();
  input.focus();
}

function deleteThread(id) {
  threads = threads.filter(t => t.id !== id);
  if (activeId === id) activeId = threads[0]?.id || null;
  saveThreads(threads); saveActive(activeId);
  renderThreads(); renderMessages();
}

function selectThread(id) {
  activeId = id; saveActive(id);
  renderThreads(); renderMessages();
  if (window.innerWidth <= 800) sidebar.classList.remove("open");
}

// ---------- DOM ----------
const sidebar = document.getElementById("sidebar");
const threadsList = document.getElementById("threadsList");
const messagesEl = document.getElementById("messages");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const form = document.getElementById("composer");
const newBtn = document.getElementById("newThreadBtn");
const menuBtn = document.getElementById("menuBtn");

newBtn.addEventListener("click", newThread);
menuBtn.addEventListener("click", () => sidebar.classList.toggle("open"));

// autosize textarea
input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 200) + "px";
});
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
});

form.addEventListener("submit", (e) => { e.preventDefault(); send(); });

// suggestion chips
document.addEventListener("click", (e) => {
  const chip = e.target.closest(".chip");
  if (chip) { input.value = chip.textContent; input.dispatchEvent(new Event("input")); input.focus(); }
});

// ---------- rendering ----------
function renderThreads() {
  threadsList.innerHTML = "";
  if (!threads.length) {
    threadsList.innerHTML = `<div style="color:var(--text-dim);font-size:12px;padding:8px 12px;">No chats yet. Say hi to senpai~</div>`;
    return;
  }
  for (const t of threads) {
    const el = document.createElement("div");
    el.className = "thread-item" + (t.id === activeId ? " active" : "");
    el.innerHTML = `<span class="thread-title">${escapeHtml(t.title)}</span><button class="thread-del" title="Delete">✕</button>`;
    el.addEventListener("click", (e) => {
      if (e.target.classList.contains("thread-del")) { e.stopPropagation(); deleteThread(t.id); }
      else selectThread(t.id);
    });
    threadsList.appendChild(el);
  }
}

function renderMessages() {
  const t = currentThread();
  messagesEl.innerHTML = "";
  if (!t || !t.messages.length) {
    messagesEl.innerHTML = `
      <div class="empty-state">
        <div class="hero-glyph">咲</div>
        <h1 class="hero-title">Yo, Nga</h1>
        <p class="hero-sub">Ask me anything</p>
        <div class="chips">
          <button class="chip">What is Gemini</button>
          <button class="chip">Debug my Python code</button>
          <button class="chip">Explain quantum entanglement</button>
          <button class="chip">Roast my startup idea</button>
        </div>
      </div>`;
    return;
  }
  for (const m of t.messages) messagesEl.appendChild(renderMessage(m.role, m.content));
  scrollToBottom();
}

function renderMessage(role, content) {
  const wrap = document.createElement("div");
  wrap.className = "msg " + role;
  const avatar = role === "user" ? "君" : "咲";
  wrap.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble"></div>`;
  wrap.querySelector(".bubble").innerHTML = renderMarkdown(content);
  return wrap;
}

function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

// ---------- sending ----------
let sending = false;
async function send() {
  const text = input.value.trim();
  if (!text || sending) return;

  if (!currentThread()) newThread();
  const t = currentThread();

  t.messages.push({ role: "user", content: text });
  if (t.title === "New chat") t.title = text.slice(0, 40) + (text.length > 40 ? "…" : "");
  saveThreads(threads); renderThreads(); renderMessages();

  input.value = ""; input.style.height = "auto";
  sending = true; sendBtn.disabled = true;

  // append streaming assistant bubble
  const assistantMsg = { role: "assistant", content: "" };
  t.messages.push(assistantMsg);
  const bubble = renderMessage("assistant", "");
  bubble.querySelector(".bubble").innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
  const empty = messagesEl.querySelector(".empty-state"); if (empty) empty.remove();
  messagesEl.appendChild(bubble);
  scrollToBottom();

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        messages: t.messages.slice(0, -1).map(m => ({ role: m.role, content: m.content })),
      }),
    });
    if (!res.ok || !res.body) throw new Error(`HTTP ${res.status}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    const bubbleContent = bubble.querySelector(".bubble");
    bubbleContent.innerHTML = "";
    let acc = "";
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      acc += decoder.decode(value, { stream: true });
      assistantMsg.content = acc;
      bubbleContent.innerHTML = renderMarkdown(acc);
      scrollToBottom();
    }
    saveThreads(threads);
  } catch (err) {
    assistantMsg.content = `Owner Api is sleeping: ${err.message}`;
    bubble.querySelector(".bubble").innerHTML = renderMarkdown(assistantMsg.content);
    saveThreads(threads);
  } finally {
    sending = false; sendBtn.disabled = false; input.focus();
  }
}

// ---------- tiny markdown ----------
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function renderMarkdown(src) {
  if (!src) return "";
  let s = escapeHtml(src);
  s = s.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${code}</code></pre>`);
  s = s.replace(/`([^`\n]+)`/g, "<code>$1</code>");
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/\*([^*]+)\*/g, "<em>$1</em>");
  s = s.replace(/^### (.*)$/gm, "<h3>$1</h3>");
  s = s.replace(/^## (.*)$/gm, "<h2>$1</h2>");
  s = s.replace(/^# (.*)$/gm, "<h1>$1</h1>");
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/(?:^|\n)((?:- .+\n?)+)/g, (m) => {
    const items = m.trim().split("\n").map(l => `<li>${l.replace(/^- /, "")}</li>`).join("");
    return `\n<ul>${items}</ul>`;
  });
  s = s.split(/\n{2,}/).map(block => {
    if (/^<(h\d|ul|ol|pre)/.test(block.trim())) return block;
    return `<p>${block.replace(/\n/g, "<br/>")}</p>`;
  }).join("");
  return s;
}

// ---------- boot ----------
renderThreads();
renderMessages();
    </script>
  </body>
</html>
